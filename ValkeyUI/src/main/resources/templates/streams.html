<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('streams')}"></nav>

<main class="container-fluid py-4">
    <div th:if="${readOnly}" class="alert alert-warning py-2">
        <strong>READ-ONLY MODE</strong> - operazioni di scrittura disabilitate
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Streams</h2>
        <div class="input-group" style="max-width: 320px;">
            <input class="form-control form-control-sm" id="patternInput" placeholder="pattern (es. tfp-*)" />
            <button class="btn btn-sm btn-outline-primary" id="filterBtn">Filtra</button>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table id="streamsTable" class="table table-sm table-hover mb-0">
                <thead>
                <tr>
                    <th>Stream</th>
                    <th>Lunghezza</th>
                    <th>First ID</th>
                    <th>Last ID</th>
                    <th>Ultimo ts (UTC)</th>
                    <th># gruppi</th>
                    <th>Pending</th>
                    <th>Memoria (B)</th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
<script th:src="@{/js/streams.js}"></script>
</body>
</html>
