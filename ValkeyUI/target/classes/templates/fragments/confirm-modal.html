<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="confirmModal(id, title)" th:id="${id}" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" th:text="${title}">Conferma operazione</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>Stai per eseguire una operazione distruttiva su <code class="confirm-stream"></code>.</p>
                <div class="confirm-extra"></div>
                <div class="mb-3">
                    <label class="form-label">Conferma digitando il nome:</label>
                    <input type="text" class="form-control confirm-input" placeholder="">
                </div>
                <div class="confirm-error text-danger small"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                <button type="button" class="btn btn-danger confirm-action" disabled>Conferma</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
