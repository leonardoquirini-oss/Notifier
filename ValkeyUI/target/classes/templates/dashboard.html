<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('dashboard')}"></nav>

<main class="container-fluid py-4">
    <div th:if="${readOnly}" class="alert alert-warning py-2">
        <strong>READ-ONLY MODE</strong> - operazioni di scrittura disabilitate
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Dashboard</h2>
        <div>
            <div class="form-check form-switch d-inline-block me-3">
                <input class="form-check-input" type="checkbox" id="autoRefresh" checked>
                <label class="form-check-label" for="autoRefresh">Auto-refresh 30s</label>
            </div>
            <button class="btn btn-sm btn-outline-primary" id="refreshBtn">Refresh</button>
        </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-md-6">
            <div class="card h-100">
                <div class="card-header">Server Info</div>
                <div class="card-body" id="serverInfoCard">
                    <div class="text-muted">Caricamento...</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100">
                <div class="card-header">Memoria</div>
                <div class="card-body" id="memoryCard">
                    <div class="text-muted">Caricamento...</div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card h-100">
                <div class="card-header">Connessione</div>
                <div class="card-body" id="pingCard">
                    <div class="text-muted">Caricamento...</div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-lg-6">
            <div class="card h-100">
                <div class="card-header">Top 10 Stream per lunghezza</div>
                <div class="card-body p-0">
                    <table class="table table-sm table-hover mb-0" id="topByLengthTable">
                        <thead>
                        <tr><th>Stream</th><th>Lunghezza</th><th>Pending</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card h-100">
                <div class="card-header">Top 10 Stream per pending</div>
                <div class="card-body p-0">
                    <table class="table table-sm table-hover mb-0" id="topByPendingTable">
                        <thead>
                        <tr><th>Stream</th><th>Pending</th><th>Lunghezza</th></tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">Messaggi/min - ultime 24h (aggregato)</div>
        <div class="card-body">
            <canvas id="aggregateChart" height="80"></canvas>
        </div>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
<script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
