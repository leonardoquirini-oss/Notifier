<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head(${title})}"></head>
<body>
<nav th:replace="~{fragments/navbar :: navbar('audit')}"></nav>

<main class="container-fluid py-4">
    <div th:if="${readOnly}" class="alert alert-warning py-2">
        <strong>READ-ONLY MODE</strong> - operazioni di scrittura disabilitate
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Audit log</h2>
        <div class="input-group" style="max-width: 220px;">
            <input class="form-control form-control-sm" type="number" id="auditLimit" value="200" />
            <button class="btn btn-sm btn-outline-primary" id="auditRefresh">Aggiorna</button>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-sm table-hover mb-0" id="auditTable">
                <thead><tr><th>Timestamp UTC</th><th>Utente</th><th>Operazione</th><th>Stream</th><th>Risultato</th><th>Durata (ms)</th><th>Params</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/scripts :: scripts}"></div>
<script th:src="@{/js/audit.js}"></script>
</body>
</html>
