version: '3.8'

services:
  # TFP Asset Damage Collector Service
  coll:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tfp-asset-damage-collector
    restart: unless-stopped
    ports:
      - 9229:9229  
    environment:
      # Scheduling
      - CRON_SCHEDULE=36 9 * * *
      - TZ=Europe/Rome

      # Redis
      - REDIS_HOST=valkey-service
      - REDIS_PORT=6379
      - REDIS_STREAM_KEY=trailer-damage-stream

      # BERLink API
      - TRAILER_API_URL=http://berlink-backend:8080
      - TRAILER_API_KEY=tfp-test-key-2025-DO-NOT-USE-IN-PRODUCTION
      - TRAILER_API_TIMEOUT=30000

      # TFP API
      - TPF_API_URL=https://tfp.circletouch.eu/api
      - TPF_API_TIMEOUT=30000
      - TPF_API_RETRY_ATTEMPTS=3
      - TPF_API_USERNAME=admin.b
      - TPF_API_PASSWORD=TB_adm_2026.

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - berlink-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  berlink-network:
    external: true
    name: berlink-dev_berlink-network