server:
  port: 8082

spring:
  application:
    name: flowcenter-collector

# FlowCenter central + ingest pipeline
flowcenter:
  collector:
    id: ${COLLECTOR_ID:berlink-prod}
    category: ${COLLECTOR_CATEGORY:db_queries}
  central:
    url: ${FLOWCENTER_URL:http://flowcenter:8000}
  api:
    token: ${FLOWCENTER_TOKEN:}
  ingest:
    batch:
      size: 200
    flush:
      interval:
        ms: 5000
    retry:
      interval:
        ms: 30000
  heartbeat:
    interval:
      ms: 30000
  spool:
    dir: ${COLLECTOR_STATE_DIR:/var/lib/collector}/spool
    max:
      bytes: 104857600          # 100 MB cap on the disk spool
  position:
    file: ${COLLECTOR_STATE_DIR:/var/lib/collector}/position.dat

# Log file tailing
query:
  log:
    file:
      path: ${QUERY_LOG_PATH:/berlink/logs/berlink_queries.log}
  monitor:
    poll:
      interval:
        ms: 1000

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    it.berlink: ${LOG_LEVEL:INFO}
