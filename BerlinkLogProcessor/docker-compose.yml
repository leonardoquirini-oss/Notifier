version: '3.8'

services:
  log-processor:
    build: .
    container_name: berlink-log-processor
    ports:
      - "8082:8082"
    environment:
      - FLOWCENTER_URL=http://flowcenter:8000
      - FLOWCENTER_TOKEN=0dbd19b008fc9ca5917132b818fed6d6a1e15d80489063ad
      - COLLECTOR_ID=berlink-log-processor-01
      - COLLECTOR_CATEGORY=db_queries
      - COLLECTOR_STATE_DIR=/var/lib/collector
    volumes:
      - /opt/berlink/backend/log:/berlink/logs/:ro
      - collector-state:/var/lib/collector
    networks:
      - berlink-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  collector-state:

networks:
  berlink-network:
    external: true
    name: berlink-dev_berlink-network
